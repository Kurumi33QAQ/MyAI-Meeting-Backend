server:
  port: ${SERVER_PORT:8002}

spring:
  application:
    name: meeting-agent-backend
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/my_ai_meeting?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: ${MYSQL_INIT_FAIL_TIMEOUT:1}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/my_ai_meeting}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:db/schema-mysql.sql
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:dummy-key-for-local-mock}}
      base-url: ${OPENAI_BASE_URL:${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}}
      chat:
        options:
          model: ${MODEL_ID:${SPRING_AI_OPENAI_MODEL:gpt-4o-mini}}
          temperature: ${OPENAI_TEMPERATURE:${SPRING_AI_OPENAI_TEMPERATURE:0.7}}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

sa-token:
  token-name: Authorization
  timeout: ${SA_TOKEN_TIMEOUT_SECONDS:86400}
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT_SECONDS:-1}
  is-concurrent: ${SA_TOKEN_IS_CONCURRENT:true}
  is-share: ${SA_TOKEN_IS_SHARE:true}
  token-style: uuid
  is-log: false

liteflow:
  rule-source: classpath:liteflow/follow-up-flow.el.xml
  print-banner: false
  print-execution-log: false

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
      - ${FRONTEND_ORIGIN_127:http://127.0.0.1:5173}
  ai:
    provider: openai-compatible
    default-model: ${MODEL_ID:${SPRING_AI_OPENAI_MODEL:gpt-4o-mini}}
    default-temperature: ${OPENAI_TEMPERATURE:${SPRING_AI_OPENAI_TEMPERATURE:0.7}}
    mock-enabled: ${AI_MOCK_ENABLED:false}
    default-system-prompt: ${AI_DEFAULT_SYSTEM_PROMPT:你是一个中文友好的 Java 后端学习助手，回答要清晰、准确，并优先解释设计原因。}
  ai-guard:
    enabled: ${AI_GUARD_ENABLED:true}
    redis-required: ${AI_GUARD_REDIS_REQUIRED:false}
    namespace: ${AI_GUARD_NAMESPACE:meetingagent:ai}
    lock-ttl: ${AI_GUARD_LOCK_TTL:30s}
    result-ttl: ${AI_GUARD_RESULT_TTL:10m}
    wait-timeout: ${AI_GUARD_WAIT_TIMEOUT:6s}
    poll-interval: ${AI_GUARD_POLL_INTERVAL:100ms}
    call-timeout: ${AI_GUARD_CALL_TIMEOUT:25s}
    user-limit-per-minute: ${AI_GUARD_USER_LIMIT_PER_MINUTE:20}
    fallback-answer: ${AI_GUARD_FALLBACK_ANSWER:AI 服务暂时不稳定，本次先给出降级回复：请稍后重试，或把问题拆得更具体后再次提交。}
  rag:
    default-top-k: ${RAG_DEFAULT_TOP_K:20}
    default-final-k: ${RAG_DEFAULT_FINAL_K:5}
    min-confidence: ${RAG_MIN_CONFIDENCE:0.15}
  job-intelligence:
    enabled: ${JOB_INTELLIGENCE_SEARCH_ENABLED:true}
    provider: ${JOB_INTELLIGENCE_PROVIDER:tavily}
    base-url: ${TAVILY_BASE_URL:https://api.tavily.com}
    api-key: ${TAVILY_API_KEY:}
    max-results: ${JOB_INTELLIGENCE_MAX_RESULTS:5}
    timeout: ${JOB_INTELLIGENCE_TIMEOUT:8s}
  evaluation:
    default-dataset-path: ${EVALUATION_DATASET_PATH:classpath:evaluation/eval_cases.json}
    report-dir: ${EVALUATION_REPORT_DIR:reports/evaluation}
    answer-hit-threshold: ${EVALUATION_ANSWER_HIT_THRESHOLD:0.35}
    citation-hit-threshold: ${EVALUATION_CITATION_HIT_THRESHOLD:0.25}
    self-check-min-confidence: ${EVALUATION_SELF_CHECK_MIN_CONFIDENCE:0.2}
