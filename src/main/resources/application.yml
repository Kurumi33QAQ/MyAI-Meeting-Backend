server:
  port: ${SERVER_PORT:8002}

spring:
  application:
    name: meeting-agent-backend
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/my_ai_meeting?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: ${MYSQL_INIT_FAIL_TIMEOUT:1}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/my_ai_meeting}
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
      schema-locations: classpath:db/schema-mysql.sql
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:dummy-key-for-local-mock}}
      base-url: ${OPENAI_BASE_URL:${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}}
      chat:
        options:
          model: ${MODEL_ID:${SPRING_AI_OPENAI_MODEL:gpt-4o-mini}}
          temperature: ${OPENAI_TEMPERATURE:${SPRING_AI_OPENAI_TEMPERATURE:0.7}}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

sa-token:
  token-name: Authorization
  timeout: ${SA_TOKEN_TIMEOUT_SECONDS:86400}
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT_SECONDS:-1}
  is-concurrent: ${SA_TOKEN_IS_CONCURRENT:true}
  is-share: ${SA_TOKEN_IS_SHARE:true}
  token-style: uuid
  is-log: false

liteflow:
  rule-source: classpath:liteflow/follow-up-flow.el.xml
  print-banner: false
  print-execution-log: false

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
      - ${FRONTEND_ORIGIN_127:http://127.0.0.1:5173}
  ai:
    provider: openai-compatible
    default-model: ${MODEL_ID:${SPRING_AI_OPENAI_MODEL:gpt-4o-mini}}
    default-temperature: ${OPENAI_TEMPERATURE:${SPRING_AI_OPENAI_TEMPERATURE:0.7}}
    mock-enabled: ${AI_MOCK_ENABLED:false}
    default-system-prompt: ${AI_DEFAULT_SYSTEM_PROMPT:你是一个中文友好的 Java 后端学习助手，回答要清晰、准确，并优先解释设计原因。}
  rag:
    default-top-k: ${RAG_DEFAULT_TOP_K:20}
    default-final-k: ${RAG_DEFAULT_FINAL_K:5}
    min-confidence: ${RAG_MIN_CONFIDENCE:0.15}
