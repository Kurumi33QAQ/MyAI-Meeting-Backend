spring:
  ai:
    openai:
      api-key: dummy-key-for-test
      base-url: https://api.openai.com
      chat:
        options:
          model: gpt-4o-mini
  datasource:
    url: jdbc:h2:mem:meeting_agent_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  data:
    mongodb:
      uri: mongodb://localhost:27017/meeting_agent_test
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

liteflow:
  rule-source: classpath:liteflow/follow-up-flow.el.xml
  print-banner: false
  print-execution-log: false

app:
  ai:
    provider: openai-compatible
    default-model: gpt-4o-mini
    default-temperature: 0.7
    mock-enabled: true
    default-system-prompt: 你是一个中文友好的 Java 后端学习助手，回答要清晰、准确，并优先解释设计原因。
  ai-guard:
    enabled: false
    redis-required: false
    namespace: meetingagent:test:ai
    lock-ttl: 30s
    result-ttl: 10m
    wait-timeout: 1s
    poll-interval: 20ms
    call-timeout: 2s
    user-limit-per-minute: 20
    fallback-answer: AI 服务暂时不可用，请稍后再试。
  evaluation:
    default-dataset-path: classpath:evaluation/eval_cases.json
    report-dir: target/test-reports/evaluation
    answer-hit-threshold: 0.35
    citation-hit-threshold: 0.25
    self-check-min-confidence: 0.2
